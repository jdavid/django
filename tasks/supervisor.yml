#
# Supervisor
#

- name: "Paths to Supervisor files"
  set_fact:
    supervisord_sock: "{{ dir_run }}/supervisord.socket"
    supervisord_pidfile : "{{ dir_run }}/supervisord.pid"
    supervisord_logfile : "{{ dir_log }}/supervisord.log"
    gunicorn_sock: "{{ dir_run }}/gunicorn.socket"

- name: "Check Supervisor is running (1/2)"
  stat:
    path: "{{ supervisord_pidfile }}"
  register: "__aux"

- name: "Check Supervisor is running (2/2)"
  set_fact:
    supervisor_running: "{{ __aux.stat.exists }}"

- name: "Rotate logs before reload"
  command: "./ansible/rotate-logs.sh"
  args:
    chdir: "{{ django_root }}"
  when: supervisor_running|bool
  failed_when: false

- name: "Supervisor configuration"
  template:
    src: "{{ supervisor_combined.template }}"
    dest: "{{ dir_etc }}/supervisor.conf"
  notify: "reload supervisor"

- name: "Start/Stop scripts"
  template:
    src: "{{ item }}"
    dest: "{{ dir_etc }}/{{ item }}"
    mode: "0744"
  with_items:
  - "start.sh"
  - "stop.sh"

- name: "Flush handlers to reload supervisor before compression"
  meta: flush_handlers

- name: "Compress rotated logs"
  command: "./ansible/rotate-logs.sh --compress"
  args:
    chdir: "{{ django_root }}"
  when: supervisor_running|bool
  failed_when: false
